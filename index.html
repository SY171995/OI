<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSE Futures Premium Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.3px;
    }

    header .subtitle {
      font-size: 0.75rem;
      color: #888;
      margin-top: 2px;
    }

    .controls {
      background: #14162a;
      border-bottom: 1px solid #2d3148;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-group label {
      font-size: 0.78rem;
      color: #aaa;
      white-space: nowrap;
    }

    input[type="text"] {
      background: #1e2038;
      border: 1px solid #3d4165;
      color: #e0e0e0;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.82rem;
      width: 200px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #5a6aff;
    }

    select {
      background: #1e2038;
      border: 1px solid #3d4165;
      color: #e0e0e0;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
    }

    .checkbox-group {
      display: flex;
      gap: 12px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-size: 0.78rem;
      color: #ccc;
    }

    .checkbox-group input[type="checkbox"] {
      accent-color: #5a6aff;
      cursor: pointer;
    }

    .stats {
      margin-left: auto;
      font-size: 0.75rem;
      color: #666;
    }

    .table-container {
      overflow: auto;
      max-height: calc(100vh - 130px);
    }

    table {
      border-collapse: collapse;
      font-size: 0.78rem;
      white-space: nowrap;
      width: max-content;
      min-width: 100%;
    }

    thead th {
      background: #1a1d2e;
      color: #aaa;
      font-weight: 500;
      padding: 8px 10px;
      text-align: right;
      border-bottom: 2px solid #2d3148;
      border-right: 1px solid #252840;
      position: sticky;
      top: 0;
      z-index: 2;
      cursor: pointer;
      user-select: none;
    }

    thead th:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 3;
      background: #1a1d2e;
    }

    thead th:hover {
      background: #252840;
      color: #fff;
    }

    thead th .sort-arrow {
      display: inline-block;
      margin-left: 4px;
      opacity: 0.4;
      font-size: 0.65rem;
    }

    thead th.sorted-asc .sort-arrow::after { content: '▲'; opacity: 1; }
    thead th.sorted-desc .sort-arrow::after { content: '▼'; opacity: 1; }
    thead th:not(.sorted-asc):not(.sorted-desc) .sort-arrow::after { content: '⇅'; }

    /* Date group headers */
    thead tr.date-header th {
      background: #12152a;
      color: #7080cc;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-bottom: 1px solid #2d3148;
      cursor: default;
    }

    thead tr.date-header th:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      background: #12152a;
    }

    tbody tr {
      border-bottom: 1px solid #1e2038;
    }

    tbody tr:hover td {
      background: #1e2240 !important;
    }

    tbody td {
      padding: 6px 10px;
      text-align: right;
      border-right: 1px solid #1e2038;
      color: #d0d0d0;
    }

    tbody td:first-child {
      text-align: left;
      font-weight: 600;
      color: #e8eaff;
      position: sticky;
      left: 0;
      background: #0f1117;
      z-index: 1;
      min-width: 110px;
    }

    tbody tr:nth-child(even) td:first-child {
      background: #111320;
    }

    tbody tr:nth-child(even) td {
      background: #111320;
    }

    /* Color coding for premium columns */
    td.pos { color: #4caf82 !important; }
    td.neg { color: #e05a5a !important; }
    td.pos-strong { background: rgba(76, 175, 130, 0.12) !important; color: #5dd89a !important; }
    td.neg-strong { background: rgba(224, 90, 90, 0.12) !important; color: #f07070 !important; }

    td.col-price { color: #b0b8ff; }
    td.col-separator { border-right: 2px solid #2d3148 !important; }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      gap: 16px;
      color: #666;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2d3148;
      border-top-color: #5a6aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #14162a;
      border-top: 1px solid #2d3148;
      padding: 6px 24px;
      font-size: 0.72rem;
      color: #555;
      display: flex;
      justify-content: space-between;
    }

    #refresh-btn {
      background: transparent;
      border: 1px solid #3d4165;
      color: #aaa;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    #refresh-btn:hover:not(:disabled) {
      border-color: #5a6aff;
      color: #fff;
    }

    #refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #refresh-log {
      position: fixed;
      bottom: 32px;
      right: 16px;
      width: 480px;
      max-height: 320px;
      background: #0d0f1c;
      border: 1px solid #2d3148;
      border-radius: 6px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      color: #aaa;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    #refresh-log-header {
      background: #1a1d2e;
      padding: 6px 12px;
      font-size: 0.72rem;
      color: #666;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2d3148;
      position: sticky;
      top: 0;
    }

    #refresh-log-close {
      cursor: pointer;
      color: #555;
      font-size: 1rem;
      line-height: 1;
    }

    #refresh-log-close:hover { color: #aaa; }

    #refresh-log-lines {
      padding: 8px 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #refresh-log-lines .log-done { color: #4caf82; font-weight: bold; }
    #refresh-log-lines .log-error { color: #e05a5a; font-weight: bold; }
    #refresh-log-lines .log-section { color: #5a6aff; }

    /* Tab navigation */
    .tab-nav {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      color: #666;
      padding: 5px 14px;
      border-radius: 4px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: #ccc; }

    .tab-btn.active {
      border-color: #5a6aff;
      color: #a0aaff;
      background: rgba(90, 106, 255, 0.08);
    }

    /* BTST panel */
    #btst-panel {
      display: none;
      padding: 20px 24px;
    }

    #btst-panel.active { display: block; }

    /* Scanner panel */
    #scanner-panel {
      display: none;
      padding: 20px 24px;
    }

    #scanner-panel.active { display: block; }

    #scanner-table-wrap table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.82rem;
    }

    #scanner-table-wrap th {
      background: #1a1d2e;
      color: #aaa;
      font-weight: 500;
      padding: 9px 12px;
      text-align: left;
      border-bottom: 2px solid #2d3148;
      white-space: nowrap;
      user-select: none;
    }

    #scanner-table-wrap th:hover { background: #252840; color: #fff; }
    #scanner-table-wrap th.sorted-asc  .sort-arrow::after { content: '▲'; opacity: 1; }
    #scanner-table-wrap th.sorted-desc .sort-arrow::after { content: '▼'; opacity: 1; }
    #scanner-table-wrap th:not(.sorted-asc):not(.sorted-desc) .sort-arrow::after { content: '⇅'; opacity: 0.4; }

    #scanner-table-wrap th:nth-child(3) { text-align: right; }

    #scanner-table-wrap td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #1e2038;
      color: #d0d0d0;
    }

    #scanner-table-wrap td:first-child {
      color: #555;
      font-size: 0.75rem;
      width: 36px;
    }

    #scanner-table-wrap td:nth-child(2) {
      font-weight: 700;
      color: #e8eaff;
      font-size: 0.88rem;
    }

    #scanner-table-wrap td:nth-child(3) { text-align: right; color: #b0b8ff; }

    #scanner-table-wrap td:nth-child(4) { color: #888; font-size: 0.78rem; }

    #scanner-table-wrap tr:hover td { background: #1e2240; }

    #scanner-loading {
      padding: 40px;
      text-align: center;
      color: #555;
      font-size: 0.85rem;
    }

    .btst-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btst-controls label {
      font-size: 0.82rem;
      color: #aaa;
    }

    #btst-date-select {
      background: #1e2038;
      border: 1px solid #3d4165;
      color: #e0e0e0;
      padding: 7px 14px;
      border-radius: 4px;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      min-width: 160px;
    }

    .btst-subtitle {
      font-size: 0.75rem;
      color: #555;
      margin-left: auto;
    }

    #btst-table-wrap table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.82rem;
    }

    #btst-table-wrap th {
      background: #1a1d2e;
      color: #aaa;
      font-weight: 500;
      padding: 9px 12px;
      text-align: right;
      border-bottom: 2px solid #2d3148;
      white-space: nowrap;
    }

    #btst-table-wrap th:first-child,
    #btst-table-wrap th:nth-child(2) { text-align: left; }

    #btst-table-wrap td {
      padding: 10px 12px;
      text-align: right;
      border-bottom: 1px solid #1e2038;
      color: #d0d0d0;
    }

    #btst-table-wrap td:first-child,
    #btst-table-wrap td:nth-child(2) {
      text-align: left;
    }

    #btst-table-wrap td:first-child {
      color: #555;
      font-size: 0.75rem;
      width: 36px;
    }

    #btst-table-wrap td:nth-child(2) {
      font-weight: 700;
      color: #e8eaff;
      font-size: 0.88rem;
    }

    #btst-table-wrap tr:hover td { background: #1e2240; }

    .btst-score {
      display: inline-block;
      background: rgba(90, 106, 255, 0.15);
      color: #a0aaff;
      border-radius: 3px;
      padding: 2px 7px;
      font-weight: 600;
    }

    .stbt-score {
      display: inline-block;
      background: rgba(224, 90, 90, 0.15);
      color: #f08080;
      border-radius: 3px;
      padding: 2px 7px;
      font-weight: 600;
    }

    .btst-side-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .btst-side-btn {
      background: transparent;
      border: 1px solid #3d4165;
      color: #666;
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .btst-side-btn:hover { color: #ccc; border-color: #5a5a80; }

    .btst-side-btn.active-long {
      border-color: #5a6aff;
      color: #a0aaff;
      background: rgba(90, 106, 255, 0.1);
    }

    .btst-side-btn.active-short {
      border-color: #e05a5a;
      color: #f08080;
      background: rgba(224, 90, 90, 0.1);
    }

    #btst-loading {
      padding: 40px;
      text-align: center;
      color: #555;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>NSE Futures Dashboard</h1>
    <div class="subtitle" id="last-updated">Loading...</div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" id="tab-premium" onclick="switchTab('premium')">Futures Premium</button>
    <button class="tab-btn" id="tab-btst" onclick="switchTab('btst')">BTST / STBT Picks</button>
    <button class="tab-btn" id="tab-scanner" onclick="switchTab('scanner')">Scanner</button>
  </div>
  <button id="refresh-btn" onclick="doRefresh()">&#x21BB; Refresh</button>
</header>

<div id="refresh-log" style="display:none">
  <div id="refresh-log-header">
    <span>Refresh Log</span>
    <span id="refresh-log-close" onclick="document.getElementById('refresh-log').style.display='none'">&#x2715;</span>
  </div>
  <div id="refresh-log-lines"></div>
</div>

<div class="controls">
  <div class="control-group">
    <label>Search</label>
    <input type="text" id="search" placeholder="Filter by symbol..." oninput="renderTable()">
  </div>

  <div class="control-group">
    <label>Show days</label>
    <select id="num-days" onchange="renderTable()">
      <option value="5">5 days</option>
      <option value="10" selected>10 days</option>
      <option value="20">20 days</option>
      <option value="50">50 days</option>
      <option value="0">All</option>
    </select>
  </div>

  <div class="control-group">
    <label>Columns</label>
    <div class="checkbox-group">
      <label><input type="checkbox" id="show-price" checked onchange="renderTable()"> Current Px</label>
      <label><input type="checkbox" id="show-next" checked onchange="renderTable()"> Next %</label>
      <label><input type="checkbox" id="show-far" checked onchange="renderTable()"> Far %</label>
    </div>
  </div>

  <div class="stats" id="stats"></div>
</div>

<!-- Futures Premium panel -->
<div id="premium-panel">
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading FUTURES_PREMIUM_DB.csv...</div>
  </div>

  <div class="table-container" id="table-wrap" style="display:none">
    <table id="main-table">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- BTST / STBT panel -->
<div id="btst-panel">
  <div class="btst-side-tabs">
    <button class="btst-side-btn active-long" id="btst-side-long" onclick="switchBtstSide('long')">&#x1F4C8; Long Build-Up (BTST)</button>
    <button class="btst-side-btn" id="btst-side-short" onclick="switchBtstSide('short')">&#x1F4C9; Short Build-Up (STBT)</button>
  </div>
  <div class="btst-controls">
    <label>Date</label>
    <select id="btst-date-select" onchange="loadBtstDate(this.value)"></select>
    <span class="btst-subtitle" id="btst-subtitle"></span>
  </div>
  <div id="btst-table-wrap">
    <div id="btst-loading">Select a date to load picks</div>
  </div>
</div>

<!-- Scanner panel -->
<div id="scanner-panel">
  <div class="btst-controls">
    <label>Date</label>
    <select id="scanner-date-select" onchange="loadScannerDate(this.value)"></select>
    <span class="btst-subtitle" id="scanner-subtitle"></span>
  </div>
  <div id="scanner-table-wrap">
    <div id="scanner-loading">Select a date to load scanner picks</div>
  </div>
</div>

<footer>
  <span>Data source: NSE India &mdash; Futures Premium Database</span>
  <span id="footer-info"></span>
</footer>

<script>
  let allRows = [];
  let allDates = [];
  let sortCol = null;
  let sortDir = 1; // 1 = asc, -1 = desc

  // Format date YYYYMMDD → DD-MMM-YY
  function fmtDate(d) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const y = d.slice(0,4), m = parseInt(d.slice(4,6))-1, day = d.slice(6,8);
    return `${day}-${months[m]}-${y.slice(2)}`;
  }

  function loadCSV(cacheBust) {
    const url = 'FUTURES_PREMIUM_DB.csv' + (cacheBust ? '?t=' + Date.now() : '');
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('table-wrap').style.display = 'none';
    Papa.parse(url, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        const headers = results.meta.fields;

        // Parse columns into date groups
        const dateSet = new Set();
        headers.forEach(h => {
          if (h === 'TckrSymb') return;
          const parts = h.split('_');
          if (parts.length >= 2) dateSet.add(parts[0]);
        });

        // Sort dates descending (newest first)
        allDates = Array.from(dateSet).sort((a, b) => b.localeCompare(a));
        allRows = results.data;

        // Update header info
        const latestDate = allDates[0] ? fmtDate(allDates[0]) : 'N/A';
        document.getElementById('last-updated').textContent =
          `${allDates.length} trading days | Latest: ${latestDate} | ${allRows.length} symbols`;
        document.getElementById('footer-info').textContent =
          `${allRows.length} symbols × ${allDates.length} dates`;

        document.getElementById('loading').style.display = 'none';
        document.getElementById('table-wrap').style.display = 'block';

        renderTable();
      },
      error: function(err) {
        document.getElementById('loading').innerHTML =
          `<div style="color:#e05a5a">Failed to load CSV: ${err.message}</div>`;
      }
    });
  }

  loadCSV(true);

  async function doRefresh() {
    const btn = document.getElementById('refresh-btn');
    const log = document.getElementById('refresh-log');
    const lines = document.getElementById('refresh-log-lines');

    btn.disabled = true;
    btn.textContent = '↻ Refreshing...';
    log.style.display = 'block';
    lines.innerHTML = '';

    function appendLine(text, cls) {
      const el = document.createElement('div');
      if (cls) el.className = cls;
      el.textContent = text;
      lines.appendChild(el);
      lines.scrollTop = lines.scrollHeight;
    }

    try {
      const resp = await fetch('/api/refresh', { method: 'POST' });
      if (!resp.ok) { throw new Error('Server error ' + resp.status); }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop();
        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data: ')) continue;
          const msg = line.slice(6);
          if (msg === 'DONE') {
            appendLine('Done! Reloading data...', 'log-done');
            loadCSV(true);
          } else if (msg.startsWith('ERROR')) {
            appendLine(msg, 'log-error');
          } else if (msg.startsWith('===')) {
            appendLine(msg, 'log-section');
          } else {
            appendLine(msg);
          }
        }
      }
    } catch (err) {
      appendLine('Error: ' + err.message, 'log-error');
    } finally {
      btn.disabled = false;
      btn.textContent = '↻ Refresh';
    }
  }

  function getActiveDates() {
    const n = parseInt(document.getElementById('num-days').value);
    return n === 0 ? allDates : allDates.slice(0, n);
  }

  function getActiveTypes() {
    return {
      price: document.getElementById('show-price').checked,
      next: document.getElementById('show-next').checked,
      far: document.getElementById('show-far').checked
    };
  }

  function getFilteredRows() {
    const q = document.getElementById('search').value.trim().toUpperCase();
    if (!q) return allRows;
    return allRows.filter(r => r.TckrSymb && r.TckrSymb.toUpperCase().includes(q));
  }

  function colorClass(val, isPrice) {
    if (isPrice) return 'col-price';
    const v = parseFloat(val);
    if (isNaN(v)) return '';
    if (v >= 1.0) return 'pos-strong';
    if (v > 0) return 'pos';
    if (v <= -1.0) return 'neg-strong';
    if (v < 0) return 'neg';
    return '';
  }

  function renderTable() {
    const dates = getActiveDates();
    const types = getActiveTypes();
    const rows = getFilteredRows();

    // Build column definitions
    const cols = []; // {date, type, key, label, isPrice, isLast}
    dates.forEach((date, di) => {
      const dateLabel = fmtDate(date);
      if (types.price) cols.push({ date, type: 'current_px', key: `${date}_current_px`, label: 'Px', dateLabel, isPrice: true, isLast: !types.next && !types.far });
      if (types.next)  cols.push({ date, type: 'next_current', key: `${date}_next_current`, label: 'Next%', dateLabel, isPrice: false, isLast: !types.far });
      if (types.far)   cols.push({ date, type: 'far_next', key: `${date}_far_next`, label: 'Far%', dateLabel, isPrice: false, isLast: true });
    });

    // Sort rows
    let sorted = [...rows];
    if (sortCol === null) {
      sorted.sort((a, b) => (a.TckrSymb || '').localeCompare(b.TckrSymb || ''));
    } else if (sortCol === 'TckrSymb') {
      sorted.sort((a, b) => sortDir * (a.TckrSymb || '').localeCompare(b.TckrSymb || ''));
    } else {
      sorted.sort((a, b) => {
        const av = parseFloat(a[sortCol]) || 0;
        const bv = parseFloat(b[sortCol]) || 0;
        return sortDir * (av - bv);
      });
    }

    // Build thead: 2 rows (date group + col type)
    const thead = document.getElementById('thead');

    // Row 1: date groups
    let r1 = '<tr class="date-header"><th></th>';
    let colIdx = 0;
    dates.forEach(date => {
      const span = (types.price ? 1 : 0) + (types.next ? 1 : 0) + (types.far ? 1 : 0);
      if (span === 0) return;
      r1 += `<th colspan="${span}">${fmtDate(date)}</th>`;
    });
    r1 += '</tr>';

    // Row 2: column headers
    let r2 = '<tr>';
    const symClass = sortCol === 'TckrSymb' ? (sortDir === 1 ? 'sorted-asc' : 'sorted-desc') : '';
    r2 += `<th class="${symClass}" onclick="onSort('TckrSymb')">Symbol<span class="sort-arrow"></span></th>`;
    cols.forEach((c, i) => {
      const isLastInGroup = c.isLast;
      const extraClass = isLastInGroup ? 'col-separator' : '';
      const sorted = sortCol === c.key ? (sortDir === 1 ? 'sorted-asc' : 'sorted-desc') : '';
      r2 += `<th class="${sorted} ${extraClass}" onclick="onSort('${c.key}')">${c.label}<span class="sort-arrow"></span></th>`;
    });
    r2 += '</tr>';

    thead.innerHTML = r1 + r2;

    // Build tbody
    const frag = document.createDocumentFragment();
    sorted.forEach(row => {
      const tr = document.createElement('tr');
      let html = `<td>${row.TckrSymb || ''}</td>`;
      cols.forEach((c, i) => {
        const val = row[c.key];
        const display = val !== undefined && val !== '' ? parseFloat(val).toFixed(c.isPrice ? 1 : 2) : '-';
        const cc = colorClass(val, c.isPrice);
        const extraClass = c.isLast ? 'col-separator' : '';
        html += `<td class="${cc} ${extraClass}">${display}</td>`;
      });
      tr.innerHTML = html;
      frag.appendChild(tr);
    });

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    tbody.appendChild(frag);

    document.getElementById('stats').textContent =
      `${sorted.length} symbols · ${dates.length} days · ${cols.length} columns`;
  }

  function onSort(key) {
    if (sortCol === key) {
      sortDir = -sortDir;
    } else {
      sortCol = key;
      sortDir = key === 'TckrSymb' ? 1 : -1; // default: desc for numbers, asc for text
    }
    renderTable();
  }

  // ── Tab switching ──────────────────────────────────────────────────────────
  function switchTab(tab) {
    ['premium', 'btst', 'scanner'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
    document.getElementById('premium-panel').style.display = tab === 'premium' ? '' : 'none';
    document.getElementById('btst-panel').classList.toggle('active', tab === 'btst');
    document.getElementById('scanner-panel').classList.toggle('active', tab === 'scanner');
    document.querySelector('.controls').style.display = tab === 'premium' ? '' : 'none';

    if (tab === 'btst' && document.getElementById('btst-date-select').options.length === 0) {
      loadBtstDates();
    }
    if (tab === 'scanner' && document.getElementById('scanner-date-select').options.length === 0) {
      loadScannerDates();
    }
  }

  // ── BTST / STBT ────────────────────────────────────────────────────────────
  let btstData = null;  // cache for BTST_PICKS_ALL.json
  let btstSide = 'long';  // 'long' or 'short'

  function fmtDateDisplay(d) {
    // YYYYMMDD → DD-MMM-YYYY
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const y = d.slice(0,4), mo = parseInt(d.slice(4,6))-1, day = d.slice(6,8);
    return `${day}-${months[mo]}-${y}`;
  }

  function switchBtstSide(side) {
    btstSide = side;
    const longBtn  = document.getElementById('btst-side-long');
    const shortBtn = document.getElementById('btst-side-short');
    longBtn.className  = 'btst-side-btn' + (side === 'long'  ? ' active-long'  : '');
    shortBtn.className = 'btst-side-btn' + (side === 'short' ? ' active-short' : '');
    const date = document.getElementById('btst-date-select').value;
    if (date) loadBtstDate(date);
  }

  async function loadBtstDates() {
    document.getElementById('btst-loading').textContent = 'Loading...';
    try {
      const resp = await fetch('BTST_PICKS_ALL.json?t=' + Date.now());
      if (!resp.ok) throw new Error('BTST_PICKS_ALL.json not found');
      btstData = await resp.json();
      const dates = (btstData.dates || []).slice(0, 7);
      const sel = document.getElementById('btst-date-select');
      sel.innerHTML = '';
      dates.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = fmtDateDisplay(d);
        sel.appendChild(opt);
      });
      if (dates.length > 0) loadBtstDate(dates[0]);
    } catch (e) {
      document.getElementById('btst-loading').textContent = 'Failed to load picks data: ' + e.message;
    }
  }

  function loadBtstDate(date) {
    const wrap = document.getElementById('btst-table-wrap');
    const dataKey = btstSide === 'long' ? 'picks' : 'short_picks';
    if (!btstData || !btstData[dataKey] || !btstData[dataKey][date]) {
      wrap.innerHTML = `<div id="btst-loading">No ${btstSide === 'long' ? 'BTST' : 'STBT'} data for ${fmtDateDisplay(date)}</div>`;
      return;
    }
    renderBtstTable(btstData[dataKey][date], date);
  }

  function colorVal(v, decimals=2) {
    const n = parseFloat(v);
    if (isNaN(n)) return '<span style="color:#444">—</span>';
    const cls = n > 0 ? 'pos' : n < 0 ? 'neg' : '';
    const sign = n > 0 ? '+' : '';
    return `<span class="${cls}">${sign}${n.toFixed(decimals)}</span>`;
  }

  function renderBtstTable(picks, date) {
    const wrap = document.getElementById('btst-table-wrap');
    const isShort = btstSide === 'short';
    const scoreClass = isShort ? 'stbt-score' : 'btst-score';
    const label = isShort ? 'STBT' : 'BTST';
    document.getElementById('btst-subtitle').textContent =
      `${label} · ${picks.length} picks · Score = 40% price + 40% volume + 20% OI`;

    let html = `<table>
      <thead><tr>
        <th>#</th>
        <th>Symbol</th>
        <th>Score</th>
        <th>Price Chg%</th>
        <th>Close</th>
        <th>Spot</th>
        <th>Fut Prem%</th>
        <th>Turnover (Cr)</th>
        <th>OI Chg%</th>
        <th>Expiry</th>
      </tr></thead><tbody>`;

    picks.forEach(r => {
      html += `<tr>
        <td>${r.rank}</td>
        <td>${r.TckrSymb}</td>
        <td><span class="${scoreClass}">${parseFloat(r.score).toFixed(1)}</span></td>
        <td>${colorVal(r.price_chg_pct)}</td>
        <td style="color:#b0b8ff">${parseFloat(r.ClsPric).toFixed(2)}</td>
        <td style="color:#888">${parseFloat(r.UndrlygPric).toFixed(2)}</td>
        <td>${colorVal(r.futures_premium_pct)}</td>
        <td>${parseFloat(r.turnover_cr).toFixed(2)}</td>
        <td>${colorVal(r.oi_change_pct)}</td>
        <td style="color:#666;font-size:0.75rem">${r.XpryDt}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  // ── Scanner ────────────────────────────────────────────────────────────────
  let scannerData    = null;
  let scannerDate    = null;
  let scannerSortCol = 'mcap';
  let scannerSortDir = -1;  // default: mcap descending

  async function loadScannerDates() {
    document.getElementById('scanner-loading').textContent = 'Loading...';
    try {
      const resp = await fetch('SCANNER_PICKS_ALL.json?t=' + Date.now());
      if (!resp.ok) throw new Error('SCANNER_PICKS_ALL.json not found');
      scannerData = await resp.json();
      const dates = scannerData.dates || [];
      const sel = document.getElementById('scanner-date-select');
      sel.innerHTML = '';
      dates.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = fmtDateDisplay(d);
        sel.appendChild(opt);
      });
      if (dates.length > 0) loadScannerDate(dates[0]);
    } catch (e) {
      document.getElementById('scanner-loading').textContent = 'Failed to load scanner data: ' + e.message;
    }
  }

  function loadScannerDate(date) {
    scannerDate = date;
    renderScannerTable();
  }

  function onScannerSort(col) {
    if (scannerSortCol === col) {
      scannerSortDir = -scannerSortDir;
    } else {
      scannerSortCol = col;
      scannerSortDir = col === 'symbol' || col === 'sector' ? 1 : -1;
    }
    renderScannerTable();
  }

  function renderScannerTable() {
    const wrap = document.getElementById('scanner-table-wrap');
    if (!scannerData || !scannerDate || !scannerData.picks[scannerDate]) {
      wrap.innerHTML = `<div id="scanner-loading">No scanner data for ${fmtDateDisplay(scannerDate)}</div>`;
      return;
    }

    let picks = [...scannerData.picks[scannerDate]];
    document.getElementById('scanner-subtitle').textContent =
      `${picks.length} stock${picks.length !== 1 ? 's' : ''} · momentum + consolidation screen`;

    // Sort
    picks.sort((a, b) => {
      if (scannerSortCol === 'symbol' || scannerSortCol === 'sector') {
        return scannerSortDir * (a[scannerSortCol] || '').localeCompare(b[scannerSortCol] || '');
      }
      return scannerSortDir * (a[scannerSortCol] - b[scannerSortCol]);
    });

    function thClass(col) {
      if (scannerSortCol !== col) return '';
      return scannerSortDir === 1 ? 'sorted-asc' : 'sorted-desc';
    }

    let html = `<table><thead><tr>
      <th>#</th>
      <th class="${thClass('symbol')}" onclick="onScannerSort('symbol')" style="cursor:pointer">Symbol<span class="sort-arrow"></span></th>
      <th class="${thClass('mcap')}"   onclick="onScannerSort('mcap')"   style="cursor:pointer">Market Cap (Cr)<span class="sort-arrow"></span></th>
      <th class="${thClass('sector')}" onclick="onScannerSort('sector')" style="cursor:pointer">Sector<span class="sort-arrow"></span></th>
    </tr></thead><tbody>`;

    picks.forEach((r, i) => {
      html += `<tr>
        <td>${i + 1}</td>
        <td>${r.symbol}</td>
        <td>${r.mcap.toLocaleString('en-IN')}</td>
        <td>${r.sector || '—'}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
  }
</script>

</body>
</html>
